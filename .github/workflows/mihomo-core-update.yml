name: Mihomo Core Update

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Create an update PR even when the recorded Mihomo version matches latest stable"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "20 3 * * 1"

concurrency:
  group: mihomo-core-update
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  update-core:
    name: Check Mihomo stable, update and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch submodule tags
        shell: bash
        run: |
          git -C core/Clash.Meta remote add metacubex https://github.com/MetaCubeX/mihomo.git 2>/dev/null || \
            git -C core/Clash.Meta remote set-url metacubex https://github.com/MetaCubeX/mihomo.git
          git -C core/Clash.Meta fetch --tags origin 2>/dev/null || true
          git -C core/Clash.Meta fetch --tags --force metacubex 2>/dev/null || true

      - name: Resolve latest stable Mihomo release
        id: latest
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST_TAG="$(gh api repos/MetaCubeX/mihomo/releases/latest --jq '.tag_name')"

          if [ -z "$LATEST_TAG" ] || ! [[ "$LATEST_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Unexpected Mihomo release tag: $LATEST_TAG"
            exit 1
          fi

          echo "tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "version=${LATEST_TAG#v}" >> "$GITHUB_OUTPUT"
          echo "Latest stable Mihomo release: $LATEST_TAG"

      - name: Compare current core version
        id: current
        shell: bash
        run: |
          CURRENT_VERSION="$(git -C core/Clash.Meta describe --tags --abbrev=0 2>/dev/null || true)"
          CURRENT_COMMIT="$(git -C core/Clash.Meta rev-parse --short=12 HEAD)"

          if [ -z "$CURRENT_VERSION" ]; then
            echo "Could not resolve current Mihomo version from git tag."
            exit 1
          fi

          CURRENT_VERSION="${CURRENT_VERSION#v}"
          echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "commit=$CURRENT_COMMIT" >> "$GITHUB_OUTPUT"
          echo "Current Mihomo core: v$CURRENT_VERSION ($CURRENT_COMMIT)"

      - name: Stop when already up to date
        if: ${{ inputs.force != true && steps.current.outputs.version == steps.latest.outputs.version }}
        shell: bash
        run: |
          echo "Mihomo core is already at ${{ steps.latest.outputs.tag }}."

      - name: Update submodule and bump app patch version
        if: ${{ inputs.force == true || steps.current.outputs.version != steps.latest.outputs.version }}
        id: update
        shell: bash
        run: |
          set -euo pipefail

          LATEST_TAG="${{ steps.latest.outputs.tag }}"
          LATEST_VERSION="${{ steps.latest.outputs.version }}"
          BRANCH="codex/mihomo-core-${LATEST_TAG}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH"

          # Fetch from upstream Mihomo to check if the tag exists
          git -C core/Clash.Meta remote add metacubex https://github.com/MetaCubeX/mihomo.git 2>/dev/null || \
            git -C core/Clash.Meta remote set-url metacubex https://github.com/MetaCubeX/mihomo.git
          git -C core/Clash.Meta fetch --tags --force metacubex

          # Ensure fork's FlClash branch is available locally
          git -C core/Clash.Meta fetch origin FlClash 2>/dev/null || true

          # Check if the fork (chen08209/Clash.Meta) has the FlClash branch
          FORK_HAS_VERSION=false
          if git -C core/Clash.Meta ls-remote --exit-code origin "refs/tags/$LATEST_TAG" >/dev/null 2>&1; then
            FORK_HAS_VERSION=true
          fi

          if [ "$FORK_HAS_VERSION" = "true" ]; then
            git -C core/Clash.Meta checkout -q "$LATEST_TAG"
          else
            echo "Fork does not have tag $LATEST_TAG. Skipping submodule update."
            echo "The fork (chen08209/Clash.Meta) needs to release a FlClash branch"
            echo "that supports Mihomo $LATEST_TAG before the submodule can be updated."
            exit 0
          fi

          VERSION_LINE="$(grep -E '^version: ' pubspec.yaml)"
          CURRENT_APP_VERSION="${VERSION_LINE#version: }"
          BASE_VERSION="${CURRENT_APP_VERSION%%+*}"
          BUILD_NUMBER="${CURRENT_APP_VERSION#*+}"

          if [ "$BASE_VERSION" = "$CURRENT_APP_VERSION" ]; then
            BUILD_NUMBER="0"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          if ! [[ "$MAJOR" =~ ^[0-9]+$ && "$MINOR" =~ ^[0-9]+$ && "$PATCH" =~ ^[0-9]+$ ]]; then
            echo "Unsupported pubspec version: $CURRENT_APP_VERSION"
            exit 1
          fi

          NEXT_PATCH=$((PATCH + 1))
          if [[ "$BUILD_NUMBER" =~ ^[0-9]+$ ]]; then
            NEXT_BUILD=$((10#$BUILD_NUMBER + 1))
          else
            NEXT_BUILD="$(date -u +'%Y%m%d%H')"
          fi
          NEXT_APP_VERSION="$MAJOR.$MINOR.$NEXT_PATCH+$NEXT_BUILD"

          perl -0pi -e "s/^version: .*/version: $NEXT_APP_VERSION/m" pubspec.yaml

          NEW_COMMIT="$(git -C core/Clash.Meta rev-parse --short=12 HEAD)"

          git add core/Clash.Meta pubspec.yaml
          if git diff --cached --quiet; then
            echo "No update changes were produced."
            exit 0
          fi

          git commit -m "chore: update mihomo core to $LATEST_TAG"
          git push --force-with-lease origin "$BRANCH"

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "app_version=$NEXT_APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "mihomo_commit=$NEW_COMMIT" >> "$GITHUB_OUTPUT"
          echo "fork_has_version=$FORK_HAS_VERSION" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        if: ${{ steps.update.outputs.branch != '' }}
        id: pr
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ steps.update.outputs.branch }}"
          FORK_HAS_VERSION="${{ steps.update.outputs.fork_has_version }}"
          TITLE="chore: update Mihomo core to ${{ steps.latest.outputs.tag }}"

          if [ "$FORK_HAS_VERSION" = "true" ]; then
            NOTES="Fork \`chen08209/Clash.Meta\` already supports this version."
          else
            NOTES="**Warning**: Fork does not yet have native support. FlClash patches were auto-applied."
          fi

          BODY_FILE="$(mktemp)"
          cat > "$BODY_FILE" <<EOF
          ## Mihomo Core Update

          - Previous: v${{ steps.current.outputs.version }} (${{ steps.current.outputs.commit }})
          - New: ${{ steps.latest.outputs.tag }} (${{ steps.update.outputs.mihomo_commit }})
          - App version: ${{ steps.update.outputs.app_version }}

          $NOTES
          EOF

          EXISTING_PR="$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number // empty')"
          if [ -n "$EXISTING_PR" ]; then
            PR_NUMBER="$EXISTING_PR"
            gh pr edit "$PR_NUMBER" --title "$TITLE" --body-file "$BODY_FILE"
          else
            PR_URL="$(gh pr create --head "$BRANCH" --title "$TITLE" --body-file "$BODY_FILE")"
            PR_NUMBER="$(echo "$PR_URL" | grep -oE '[0-9]+$')"
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "PR #$PR_NUMBER created/updated"

      - name: Wait for PR checks and auto-merge
        if: ${{ steps.pr.outputs.pr_number != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.pr_number }}"
          echo "Waiting for PR #$PR_NUMBER to be mergeable..."

          MAX_WAIT=300
          ELAPSED=0
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            MERGEABLE="$(gh pr view "$PR_NUMBER" --repo songzhengpei/Slclash --json mergeable --jq '.mergeable')"
            STATE="$(gh pr view "$PR_NUMBER" --repo songzhengpei/Slclash --json state --jq '.state')"

            if [ "$STATE" != "OPEN" ]; then
              echo "PR #$PR_NUMBER is no longer open (state=$STATE). Skipping merge."
              exit 0
            fi

            if [ "$MERGEABLE" = "MERGEABLE" ]; then
              echo "PR #$PR_NUMBER is mergeable. Merging..."
              gh pr merge "$PR_NUMBER" --repo songzhengpei/Slclash --merge --delete-branch
              echo "PR #$PR_NUMBER merged."
              break
            fi

            echo "Not yet mergeable (mergeable=$MERGEABLE). Waiting 10s..."
            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "Timed out waiting for PR #$PR_NUMBER to become mergeable."
            exit 1
          fi

      - name: Create release tag
        if: ${{ steps.pr.outputs.pr_number != '' }}
        id: tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Syncing main..."
          git fetch origin main
          git checkout main
          git merge origin/main --ff-only

          APP_VERSION="$(python3 -c "
          import re
          from pathlib import Path
          text = Path('pubspec.yaml').read_text(encoding='utf-8')
          m = re.search(r'^version:\s*([0-9]+\.[0-9]+\.[0-9]+)(?:\+.*)?$', text, re.M)
          if not m:
              raise SystemExit('Cannot parse version from pubspec.yaml')
          print(m.group(1))
          ")"

          TAG_NAME="v${APP_VERSION}"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists locally. Skipping."
            exit 0
          fi

          if git ls-remote --tags origin "refs/tags/$TAG_NAME" | grep -q "$TAG_NAME"; then
            echo "Tag $TAG_NAME already exists on origin. Skipping."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
          echo "Tag $TAG_NAME created and pushed."

      - name: Trigger release workflow
        if: ${{ steps.tag.outputs.tag_name != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${{ steps.tag.outputs.tag_name }}"
          echo "Triggering SlClash Android Release for $TAG_NAME..."
          gh workflow run "SlClash Android Release" --repo songzhengpei/Slclash -f tag="$TAG_NAME"
          echo "Release workflow triggered."

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "## Mihomo Core Update Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Latest Mihomo: ${{ steps.latest.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Previous core: v${{ steps.current.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.update.outputs.branch }}" != "" ]; then
            echo "- PR: #${{ steps.pr.outputs.pr_number }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- App version: ${{ steps.update.outputs.app_version }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- Tag: ${{ steps.tag.outputs.tag_name }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- No update needed" >> "$GITHUB_STEP_SUMMARY"
          fi
